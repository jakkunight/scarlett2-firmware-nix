name: Build Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0-rc1)'
        required: true
        default: 'test'

permissions:
  contents: write

env:
  APP_NAME: scarlett2-firmware
  APP_VERSION: ${{ github.event.release.tag_name || github.event.inputs.version }}

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: dnf install -y rpm-build make git

      - name: Build RPM
        run: |
          VERSION=$(echo "${{ env.APP_VERSION }}" | sed 's/-rc/~rc/g')
          make rpm VERSION="$VERSION"

      - name: Find RPM
        id: find-rpm
        run: |
          RPM_PATH=$(find ~/rpmbuild/RPMS -name '*.rpm' | head -1)
          echo "rpm_path=$RPM_PATH" >> $GITHUB_OUTPUT

      - name: Upload RPM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-package
          path: ${{ steps.find-rpm.outputs.rpm_path }}

      - name: Upload RPM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.find-rpm.outputs.rpm_path }}

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build deb
        run: make deb VERSION=${{ env.APP_VERSION }}

      - name: Upload deb as artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-package
          path: ./${{ env.APP_NAME }}_${{ env.APP_VERSION }}.deb

      - name: Upload deb to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ./${{ env.APP_NAME }}_${{ env.APP_VERSION }}.deb
